defaults:
  # Custom theme: terminal-dark slide chrome + OneHalfDark code highlighting.
  theme: terminal-dark-onehalf
  # Terminal font size hint used for image/layout sizing.
  terminal_font_size: 16
  # Ghostty speaks the kitty graphics protocol but isn't detected from
  # TERM=xterm-256color, so "auto" falls back to ascii-blocks (blank images).
  # Force kitty-local (presenterm + terminal share the filesystem here).
  image_protocol: kitty-local

options:
  # Show implicit slide breaks so a trailing heading ends the slide.
  implicit_slide_ends: true
  # Treat a setext-style heading underline as a new-slide separator.
  end_slide_shorthand: true

snippet:
  exec:
    # Allow running code blocks live with +exec during a demo.
    enable: true
  render:
    threads: 2

mermaid:
  scale: 2
