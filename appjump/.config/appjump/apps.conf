# Raycast-style Hyper+letter app switcher.
#
# Hold Enter (the "hyper" key) and tap KEY to focus-or-launch the app.
# kanata (~/.config/kanata/kanata.kbd) maps each KEY to `appjump KEY`, which
# runs the command directly -- no keycode is emitted to the compositor, so
# nothing collides with Steam / media keys / KDE shortcuts.
#
# One app per line:  KEY | WM_CLASS | DESKTOP_ID
#   KEY        letter you tap while holding Enter (must also be wired in
#              kanata.kbd's `apps` layer -> `(cmd appjump KEY)`).
#   WM_CLASS   window app-id / WM class to match for focus (anchored exact).
#   DESKTOP_ID .desktop basename to launch when no window exists (no .desktop).
#
# To add an app: add a line here AND add its key to kanata.kbd (defsrc + base +
# apps layer + a matching `(cmd appjump KEY)` alias), then restart kanata.
#
# KEY | WM_CLASS              | DESKTOP_ID
g     | com.mitchellh.ghostty | com.mitchellh.ghostty
f     | firefox               | org.mozilla.firefox
o     | obsidian              | md.obsidian.Obsidian
d     | discord               | com.discordapp.Discord
p     | 1Password             | 1password
