# root: ~/Developer/galileo-inc/frontend-monorepo
session: ${session}
root: ${root}

windows:
  - name: nvim
    commands:
      - nvim

  - name: claude
    commands:
      - claude --add-dir ../api --add-dir ../core-api

  - name: server
    commands:
      - PORT=$(port-hash "${session}" dev) nr start
