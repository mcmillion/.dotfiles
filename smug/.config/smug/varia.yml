# root: ~/Developer/mcmillion/varia
session: ${session}
root: ${root}

windows:
  - name: nvim
    commands:
      - nvim

  - name: claude
    commands:
      - claude

  - name: servers
    layout: even-horizontal
    commands:
      - PORT=$(port-hash "${session}" dev) nr dev
    panes:
      - type: horizontal
        commands:
          - PORT=$(port-hash "${session}" storybook) nr storybook
