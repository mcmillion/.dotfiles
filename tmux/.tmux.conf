set -g default-terminal "tmux-256color"

# Undercurl
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

# Alt+j/k for session switching (by index order)
bind-key -n M-j run-shell 'sessions=$(tmux list-sessions -F "##S"); current=$(tmux display-message -p "##S"); next=$(echo "$sessions" | grep -A1 "^${current}$" | tail -1); [ "$next" = "$current" ] && next=$(echo "$sessions" | head -1); tmux switch-client -t "$next"'
bind-key -n M-k run-shell 'sessions=$(tmux list-sessions -F "##S"); current=$(tmux display-message -p "##S"); prev=$(echo "$sessions" | grep -B1 "^${current}$" | head -1); [ "$prev" = "$current" ] && prev=$(echo "$sessions" | tail -1); tmux switch-client -t "$prev"'

# Set default shell to zsh
set -g default-command /opt/homebrew/bin/zsh
set -g default-shell /opt/homebrew/bin/zsh

# Use Ctrl+A for commands
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Increase history limit
set-option -g history-limit 500000

# Reduce tmux escape (delay after hitting escape) time
set-option -sg escape-time 0

# Enable focus events
set -g focus-events on

# Enable mouse
set -g mouse on

# Disable tmux OSC 52 clipboard (prevents conflict with copy-pipe pbcopy)
set -s set-clipboard off

# Attach to another session when killing current session
set -g detach-on-destroy off

# Enable visual and audible bell
set -g visual-bell off
set -g bell-action any

# Reduce repeat (delay before prefix key resets) time
set-option -g repeat-time 250

# Start window indexing at one instead of zero
set -g base-index 1
set-window-option -g pane-base-index 1

# Reload configuration
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

# Workaround for default-path being removed
bind-key c new-window -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"

# Vim-style movement
setw -g mode-keys vi

# Enter copy mode with prefix + space
bind Space copy-mode

# Setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi 'v' send -X begin-selection

# Bind copy to 'y'
bind -T copy-mode-vi y send -X copy-pipe "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word \; run -d 0.1 \; send -X copy-pipe-and-cancel "pbcopy"

# Bind paste (from user namespace) to ']'
bind ] run "pbpaste | tmux load-buffer - && tmux paste-buffer"

# Quick window movement
bind -n M-l next-window
bind -n M-h previous-window
bind -n M-Left swap-window -t -1\; select-window -t -1
bind -n M-Right swap-window -t +1\; select-window -t +1

# Prefix-free splits, pane, and window management
bind -n M-\\ split-window -h -c "#{pane_current_path}"
bind -n M-- split-window -v -c "#{pane_current_path}"
bind -n M-z resize-pane -Z
bind -n M-x kill-pane
bind -n M-c new-window -c "#{pane_current_path}"
bind -n M-= select-layout -E

# Bind h/j/k/l to pane jumping
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Bind Prefix + Left/Up/Down/Right to pane resizing
bind -r Left resize-pane -L 3
bind -r Down resize-pane -D 3
bind -r Up resize-pane -U 3
bind -r Right resize-pane -R 3

# Rebalance panes evenly
bind = select-layout -E

# Bind prefix-X to stop session (smug stop if smug session, otherwise kill)
bind X confirm-before -p "Stop session #S? (y/n)" "run-shell 'tmux switch-client -n 2>/dev/null; (smug stop #S 2>/dev/null || tmux kill-session -t #S) >/dev/null 2>&1'"

# Bind prefix-s to create a new named session and switch to it
bind n command-prompt -p "New session name:" "new-session -s '%%'"

# open smug session selector
bind S display-popup -E "tmux-smug-select"

# fork claude session into a new split
bind C split-window -h -c "#{pane_current_path}" "claude --continue --fork-session"

# open lazygit in popup
bind g display-popup -d '#{pane_current_path}' -w80% -h80% -E lazygit

# open new terminal in popup
bind -n M-` if-shell -F '#{==:#{session_name},popup}' { detach-client } { display-popup -d '#{pane_current_path}' -w80% -h80% -E "tmux new-session -A -s popup \\; set detach-on-destroy on" }

# Bind prefix-b to jump to previous terminal prompt
bind b copy-mode\; send-keys -X start-of-line\; send-keys -X search-backward "➜"

set -g status-style bg=#1c1f24,fg=white
set -g window-active-style bg=#1c1f24
set -g window-style bg=#1c1f24
set -g window-status-bell-style fg=white,bg=#1c1f24
set -g window-status-activity-style fg=white,bg=#1c1f24
set -g pane-active-border-style fg=#6c727e
set -g pane-border-style fg=black
set -g popup-border-style fg=brightblack
set -g message-style bg=black,fg=brightwhite
set -g message-command-style bg=black,fg=brightwhite
set -g display-panes-active-colour brightwhite
set -g display-panes-colour blue
set -g mode-style fg=brightwhite,bg=brightblack

# Prefix Highlight
set -g @prefix_highlight_fg 'black'
set -g @prefix_highlight_bg 'blue'
set -g @prefix_highlight_show_copy_mode on
set -g @prefix_highlight_copy_mode_attr fg=black,bg=yellow
set -g @prefix_highlight_prefix_prompt 'Prefix'
set -g @prefix_highlight_copy_prompt 'Copy'

# Window title
set -g set-titles on
set -g set-titles-string '[#S] #W'

# Statusbar formatting
set -g status-interval 5
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}/ #{pane_current_command}'
set -g status-left " #[fg=#{@session_color}]#S  "
set -g status-left-length 40
set -g status-right-length 80
set -g status-right "#{prefix_highlight}   #[fg=#242932,bg=#1c1f24]#[bg=#242932,fg=#6c727e] #(tmux-sysstat) #[fg=#242932,bg=#1c1f24]"
setw -g window-status-format "#[fg=#242932,bg=#1c1f24]#[bg=#242932,fg=white] #{?@claude_window_alert,󱙺  ,}#W #[fg=#242932,bg=#1c1f24]"
setw -g window-status-current-format "#[fg=#3E4553,bg=#1c1f24]#[bg=#3E4553,fg=brightwhite] #{?@claude_window_alert,󱙺  ,}#W #[fg=#3E4553,bg=#1c1f24]"

# Claude alert: custom session chooser with alert icon
bind s choose-tree -sZO name -F "#{session_windows} windows#{?@claude_session_alert, 󱙺,}"

# Claude alert: auto-clear on session/window switch
set-hook -g client-session-changed "set-option -u @claude_session_alert \; set-option -wu @claude_window_alert"
set-hook -g session-window-changed "set-option -wu @claude_window_alert"

# Per-session name color
set-hook -ga client-session-changed "run-shell ~/.local/bin/tmux-session-color"
set-hook -g session-created "run-shell ~/.local/bin/tmux-session-color"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
run '~/.tmux/plugins/tpm/tpm'

# Set initial session color
run-shell ~/.local/bin/tmux-session-color
