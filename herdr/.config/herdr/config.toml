# herdr configuration
# Lives at ~/.config/herdr/config.toml (stowed from dotfiles).
# Run `herdr --default-config` to see every available option with docs.

# Skip the first-run onboarding prompt.
onboarding = false

[theme]
# Match the One Dark palette used by nvim and ghostty.
name = "one-dark"

[ui]
# Darker gray instead of One Dark's default blue accent.
accent = "#5c6370"

# Leave mouse capture on for herdr's mouse UI (pane select, resize, scroll).
# Trade-off: Cmd-click to open URLs is swallowed; use Shift-Cmd-click instead.
# Set false to give plain Cmd-click back to the terminal.
mouse_capture = true

# Show detected agent labels on pane borders - useful when running agents.
show_agent_labels_on_pane_borders = true

[keys]
# Ctrl+A prefix to match tmux muscle memory.
# Note: collides with tmux's prefix, so don't nest herdr inside tmux
# while this is set - herdr is being used as a full tmux replacement.
prefix = "ctrl+a"

# Reload config. Bumps resize_mode off prefix+r.
reload_config = "prefix+r"
resize_mode = "prefix+shift+r"

# Splits.
split_vertical = "prefix+backslash"   # side by side
split_horizontal = "prefix+minus"     # stacked

# Pane focus.
focus_pane_left = "prefix+h"
focus_pane_down = "prefix+j"
focus_pane_up = "prefix+k"
focus_pane_right = "prefix+l"

# Zoom + close pane.
zoom = "prefix+z"
close_pane = "prefix+x"

# Tabs.
new_tab = "prefix+c"
next_tab = "alt+l"
previous_tab = "alt+h"
rename_tab = "prefix+comma"
close_tab = "prefix+shift+x"

# Workspaces.
new_workspace = "prefix+n"
workspace_picker = "alt+s"
next_workspace = "alt+j"
previous_workspace = "alt+k"
close_workspace = "prefix+shift+d"

# Free prefix+g for the lazygit popup below (herdr's goto lives there by default).
goto = ""

# lazygit
[[keys.command]]
key = "prefix+g"
type = "pane"
command = "lazygit"

# tuxedo todo
[[keys.command]]
key = "prefix+t"
type = "pane"
command = "tuxedo ~/todo.txt"

# fork claude into a new pane
[[keys.command]]
key = "alt+shift+c"
type = "pane"
command = "claude --continue --fork-session"
