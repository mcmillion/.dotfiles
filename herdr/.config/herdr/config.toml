# herdr configuration
# Lives at ~/.config/herdr/config.toml (stowed from dotfiles).
# Run `herdr --default-config` to see every available option with docs.

# Skip the first-run onboarding prompt.
onboarding = false

[theme]
# Match the One Dark palette used by nvim and ghostty.
name = "one-dark"

[theme.custom]
# Let the tab bar strip use the host terminal's background instead of
# One Dark's panel color, so it blends into Ghostty's darker bg.
panel_bg = "reset"

[ui]
# One Dark's green accent.
accent = "#98c379"

# Leave mouse capture on for herdr's mouse UI (pane select, resize, scroll).
# Trade-off: Cmd-click to open URLs is swallowed; use Shift-Cmd-click instead.
# Set false to give plain Cmd-click back to the terminal.
mouse_capture = true

# Show detected agent labels on pane borders - useful when running agents.
show_agent_labels_on_pane_borders = true

agent_panel_sort = "spaces"
[keys]
prefix = "ctrl+a"

reload_config = "prefix+shift+r"
resize_mode = "prefix+r"

# Splits.
split_vertical = "prefix+backslash"   # side by side
split_horizontal = "prefix+minus"     # stacked

# Pane focus - prefix fallback for shell/agent panes.
# ctrl+hjkl is handled by the herdr-splits.nvim plugin actions below, which
# forward to nvim when it's focused and switch herdr panes otherwise.
focus_pane_left = "prefix+h"
focus_pane_down = "prefix+j"
focus_pane_up = "prefix+k"
focus_pane_right = "prefix+l"

# Zoom + close pane.
zoom = "prefix+z"
close_pane = "prefix+x"

# Tabs.
new_tab = "prefix+c"
next_tab = "alt+l"
previous_tab = "alt+h"
rename_tab = "prefix+comma"
close_tab = "prefix+shift+x"

# Workspaces.
new_workspace = "prefix+n"
workspace_picker = "alt+s"
next_workspace = "alt+j"
previous_workspace = "alt+k"
close_workspace = "prefix+shift+d"

# Agents - cycle through running agents in the agent panel.
# cmd+j/k are left unbound in ghostty so they pass through to herdr.
next_agent = "cmd+j"
previous_agent = "cmd+k"

# Free prefix+g for the lazygit popup below (herdr's goto lives there by default).
goto = ""

# lazygit
[[keys.command]]
key = "prefix+g"
type = "pane"
command = "lazygit"

# tuxedo todo
[[keys.command]]
key = "prefix+t"
type = "pane"
command = "tuxedo ~/todo.txt"

# new worktree: prompt for branch, create sibling worktree, template env from
# 1Password, open it focused. Pane lingers on error so warnings stay readable.
[[keys.command]]
key = "prefix+w"
type = "pane"
command = "new-worktree"

# open worktree: fzf-pick an existing worktree (incl. main) and open it nested +
# focused. Works from inside any worktree, unlike herdr's container-only native.
[[keys.command]]
key = "prefix+o"
type = "pane"
command = "open-worktree"

# on-call debug: pull the galileo repos and open a claude tab with all of them
# loaded, in a shared "on-call" workspace (one debug tab per incident).
[[keys.command]]
key = "cmd+shift+o"
type = "pane"
command = "on-call-debug"

# fork claude into a new pane
[[keys.command]]
key = "alt+shift+c"
type = "pane"
command = "claude --continue --fork-session"

# herdr-splits.nvim: ctrl+hjkl moves between nvim splits and herdr panes as one.
# Forwards to nvim when it's the focused pane, switches herdr panes otherwise.
[[keys.command]]
key = "ctrl+h"
type = "plugin_action"
command = "herdr-splits.nav-left"

[[keys.command]]
key = "ctrl+j"
type = "plugin_action"
command = "herdr-splits.nav-down"

[[keys.command]]
key = "ctrl+k"
type = "plugin_action"
command = "herdr-splits.nav-up"

[[keys.command]]
key = "ctrl+l"
type = "plugin_action"
command = "herdr-splits.nav-right"
